services:

  # DB service
  db:
    image: postgres:latest
    container_name: log_analyzer_db
    environment:
      POSTGRES_USER: dogan
      POSTGRES_PASSWORD: dogan
      POSTGRES_DB: loganalyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U dogan -d loganalyzer"]
        interval: 10s
        timeout: 5s
        retries: 5

  # Backend service
  backend:
    build: 
      context: ./Backend 
      dockerfile: Dockerfile
    container_name: log_analyzer_backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy 
    ports:
      - "8080:8080" 
    volumes:
      - ./Backend/rules.yaml:/app/rules.yaml
      - ./Backend/reports:/app/reports
      - ./test-logs:/var/log:ro 
      - /etc/localtime:/etc/localtime:ro
    environment:
      - LOG_FILE_PATH=/var/log
      - RULES_FILE_PATH=/app/rules.yaml
      - REPORTS_DIR_PATH=/app/reports
      - TZ=Europe/Istanbul
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=dogan
      - DB_PASSWORD=dogan
      - DB_NAME=loganalyzer

  # Frontend service
  frontend:
    build: 
      context: ./Frontend 
      dockerfile: Dockerfile
    container_name: log_analyzer_frontend
    restart: always
    ports:       
      - "3000:80"
    depends_on:
      - backend

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: log_analyzer_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # Promtail - Log Shipper
  promtail:
    image: grafana/promtail:latest
    container_name: log_analyzer_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: log_analyzer_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: log_analyzer_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus
    
volumes:
  postgres_data_v2:
  loki_data:
  prometheus_data:
  grafana_data:
