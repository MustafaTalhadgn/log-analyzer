global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Backend application (if we add metrics endpoint)
  - job_name: 'log-analyzer-backend'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/metrics'
